<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITM Dehradun AI Assistant</title>
    <link rel="stylesheet" href="bot.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="60">
        </div>
        <h2>🎓 ITM Dehradun Assistant</h2>
        <div id="chatbox"></div>
        <div class="buttons">
            <button onclick="ask('hello')">👋 Hello</button>
            <button onclick="ask('courses')">📚 Courses</button>
            <button onclick="ask('bca')">💻 BCA Program</button>
            <button onclick="ask('admission')">📝 Admission</button>
            <button onclick="ask('fees')">💰 Fees</button>
            <button onclick="ask('location')">📍 Location</button>
            <button onclick="ask('library')">📖 Library</button>
            <button onclick="ask('placement')">💼 Placement</button>
            <button onclick="ask('faculty')">👨‍🏫 Faculty</button>
            <button onclick="ask('hostel')">🏠 Hostel</button>
            <button onclick="ask('campus')">🏫 Campus</button>
            <button onclick="ask('contact')">☎ Contact</button>
        </div>
        <button class="clearBtn" onclick="clearChat()">🧹 Clear Chat</button>
    </div>
</body>
</html>
